# Site Build Settings

url: "https://www.letnote.in"
baseurl: ""

paginate:            10
paginate_path: "/page/:num/"

# Build settings
markdown:            kramdown
highlighter:         rouge
permalink:           /blog/:title
plugins:             [jekyll-paginate, jekyll-sitemap, jekyll-feed, jekyll-seo-tag, jekyll-compress-images]

# Compression
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  ignore:
    envs: [development]
  blanklines: false
  profile: false
  startings: []

# Performance optimizations
sass:
  style: compressed
  sourcemap: never

# Image optimization
imageoptim:
  pngout: false
  svgo: true
  verbose: false

title:               'LetNote'
tagline:             'Master Backend Development & Stay Informed'
description:         'LetNote provides comprehensive tutorials on Node.js, JWT, Authentication, APIs and backend technologies along with updates on Indian government schemes and education news. Learn to build secure, scalable applications while staying informed about important initiatives.'
author:              'Ritu Raj Pratap Singh'
lang:                'en'

# SEO
logo: /assets/img/logo.png
social:
  name: Ritu Raj Pratap Singh
  links:
    - https://twitter.com/riturajps
    - https://www.linkedin.com/in/iamriturajps/
    - https://github.com/theriturajps

twitter:
  username: riturajps
  card:     summary_large_image

# RSS 2.0 can be used instead of Atom by uncommenting following two lines
feed:
 path: rss-feed.xml

timezone: Asia/Kolkata

# Collections
collections:
  categories:
    output: true
    permalink: /category/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
