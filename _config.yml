# Site Build Settings

# Jekyll-paginate-v2 configuration
#  pagination:
#   enabled: true
#   per_page: 5
#   permalink: '/page/:num/'
#   title: ':title - page :num of :max'
#   limit: 0
#   sort_field: 'date'
#   sort_reverse: true

# jekyll-paginate configuration
paginate:            8

# Build settings
markdown:            kramdown
highlighter:         rouge
permalink:           /post/:title
plugins:             [jekyll-paginate, jekyll-sitemap, jekyll-feed, jekyll-seo-tag]

# Custom permalink structures
defaults:
  -
    scope:
      path: ""
      type: "pages"
    values:
      permalink: /page/:basename

# Customise atom feed settings (this is where Jekyll-Feed gets configuration information)
title:		           'riturajps'
description:	       'Blog'
author:              'Ritu Raj'

# RSS 2.0 can be used instead of Atom by uncommenting following two lines
# feed:
#  path: rss-feed.xml