title: "Ritu Raj's Blog"
email: your-email@example.com
description: >-
  Information Technology graduate and MCA candidate specializing in Cybersecurity 
  and Software Development. Sharing insights on full-stack development, 
  cybersecurity, and open-source contributions.
baseurl: ""
url: "https://theriturajps.github.io"
twitter_username: your_username
github_username: theriturajps

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Pagination
paginate: 9
paginate_path: "/page:num/"

# Collections
collections:
  projects:
    output: true
    permalink: /:collection/:name/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-archives

# Archives
jekyll-archives:
  enabled:
    - categories
    - tags
    - year
    - month
  layout: archive
  permalinks:
    year: '/archive/:year/'
    month: '/archive/:year/:month/'
    category: '/category/:name/'
    tag: '/tag/:name/'

# SEO
lang: en_US
author:
  name: Ritu Raj
  email: your-email@example.com
  twitter: your_username

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md