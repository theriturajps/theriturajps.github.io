<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <!-- Use Jekyll SEO plugin -->
    {% seo %}
  <link rel="stylesheet" href="{{ site.github.url }}/assets/css/main.css">
  <link rel="stylesheet" href="{{ site.github.url }}/assets/css/syntax.css">
  <!-- Use Atom -->
  {% feed_meta %}

  <!-- Dark/Light mode toggle -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const toggle = document.getElementById('dark-mode-toggle');
      const prefersDarkScheme = window.matchMedia('(prefers-color-scheme: dark)');
      
      // Check localStorage for user preference
      const currentTheme = localStorage.getItem('theme');
      if (currentTheme === 'dark' || (!currentTheme && prefersDarkScheme.matches)) {
        document.body.classList.add('dark-mode');
        toggle.checked = true;
      }
      
      toggle.addEventListener('change', function() {
        if (this.checked) {
          document.body.classList.add('dark-mode');
          localStorage.setItem('theme', 'dark');
        } else {
          document.body.classList.remove('dark-mode');
          localStorage.setItem('theme', 'light');
        }
      });
    });
  </script>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #505050;
      --link-color: #000000;
      --header-color: #333333;
      --light-gray: #999999;
      --extra-light-gray: #cccccc;
      --code-bg: #f5f5f5;
      --card-bg: #ffffff;
      --card-shadow: rgba(0, 0, 0, 0.1);
    }
    
    .dark-mode {
      --bg-color: #1a1a1a;
      --text-color: #e0e0e0;
      --link-color: #ffffff;
      --header-color: #f0f0f0;
      --light-gray: #777777;
      --extra-light-gray: #444444;
      --code-bg: #2d2d2d;
      --card-bg: #2a2a2a;
      --card-shadow: rgba(0, 0, 0, 0.3);
    }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s, color 0.3s;
    }
    
    a {
      color: var(--link-color);
    }
    
    h1, h2, h3, h4, h5, h6 {
      color: var(--header-color);
    }
    
    .post-date, .footer, .footer a, .header-subtitle, .post-meta {
      color: var(--light-gray);
    }
    
    blockquote {
      border-left-color: var(--extra-light-gray);
      color: var(--light-gray);
    }
    
    hr {
      border-top-color: var(--extra-light-gray);
    }
    
    code, pre {
      background-color: var(--code-bg);
    }
    
    .compact-card {
      background-color: var(--card-bg);
      box-shadow: 0 1px 6px var(--card-shadow);
    }
    
    .dark-mode-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 100;
    }
    
    .dark-mode-toggle label {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    
    .dark-mode-toggle input {
      margin-left: 0.5rem;
    }
  </style>

  <!-- Rest of your head content -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Serif:400,400italic,700%7CPT+Sans:400">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Code+Pro">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Quattrocento+Sans">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <script type="text/javascript" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-MML-AM_CHTML">
    MathJax.Hub.Config({
      tex2jax: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
      }
    });
  </script>
  <!-- Google Analytics -->
  {% include google-analytics.html %}
</head>
