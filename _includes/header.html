<header class="header" role="banner">
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-container">
      <!-- Logo/Brand -->
      <div class="navbar-brand">
        <a href="{{ site.baseurl }}/" class="brand-link">
          <span class="brand-text">{{ site.title }}</span>
        </a>
      </div>
      
      <!-- Mobile Menu Toggle -->
      <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle navigation menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
      
      <!-- Navigation Menu -->
      <div class="navbar-menu" id="navbar-menu">
        <ul class="navbar-nav">
          {% for item in site.data.settings.menu %}
            <li class="nav-item">
              <a href="{{ site.baseurl }}{{ item.url }}" 
                 class="nav-link {% if page.url == item.url %}active{% endif %}">
                {{ item.name }}
              </a>
            </li>
          {% endfor %}
        </ul>
        
        <!-- Theme Toggle -->
        <div class="navbar-actions">
          <button class="theme-toggle" id="theme-toggle-header" aria-label="Toggle dark mode">
            <i class="fas fa-moon" id="theme-icon"></i>
          </button>
          
          <!-- Social Links -->
          <div class="social-links">
            {% for social in site.data.settings.social limit:3 %}
              <a href="{{ social.link }}" 
                 class="social-link" 
                 target="_blank" 
                 rel="noopener noreferrer"
                 aria-label="{{ social.label }}">
                <i class="fab fa-{{ social.icon }}"></i>
              </a>
            {% endfor %}
          </div>
        </div>
      </div>
    </div>
  </nav>
</header>

<script>
// Mobile menu toggle
document.addEventListener('DOMContentLoaded', function() {
  const mobileToggle = document.getElementById('mobile-menu-toggle');
  const navbarMenu = document.getElementById('navbar-menu');
  
  mobileToggle.addEventListener('click', function() {
    navbarMenu.classList.toggle('active');
    mobileToggle.classList.toggle('active');
  });
  
  // Close mobile menu when clicking outside
  document.addEventListener('click', function(event) {
    if (!event.target.closest('.navbar')) {
      navbarMenu.classList.remove('active');
      mobileToggle.classList.remove('active');
    }
  });
});
</script>
