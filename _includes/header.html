<header class="header">
  <nav class="navbar container">
    <a href="{{ '/' | relative_url }}" class="logo" aria-label="Home">
      {{ site.title }}
    </a>
    
    <!-- Desktop Navigation -->
    <ul class="nav-menu" id="nav-menu">
      {% for item in site.data.settings.menu %}
        <li class="nav-item">
          <a href="{{ item.url | relative_url }}" class="nav-link" 
             {% if page.url == item.url %}aria-current="page"{% endif %}>
            {{ item.name }}
          </a>
        </li>
      {% endfor %}
    </ul>
    
    <!-- Mobile Hamburger -->
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </nav>
  
  <!-- Mobile Navigation -->
  <div class="mobile-nav" id="mobile-nav">
    <ul class="mobile-nav-menu">
      {% for item in site.data.settings.menu %}
        <li class="mobile-nav-item">
          <a href="{{ item.url | relative_url }}" class="mobile-nav-link"
             {% if page.url == item.url %}aria-current="page"{% endif %}>
            {{ item.name }}
          </a>
        </li>
      {% endfor %}
    </ul>
    
    <!-- Social Icons in Mobile Menu -->
    <div class="mobile-social">
      {% for item in site.data.settings.social %}
        <a href="{{ item.link }}" target="_blank" rel="noopener noreferrer" aria-label="{{ item.icon }}">
          <i class="fab fa-{{ item.icon }}" aria-hidden="true"></i>
        </a>
      {% endfor %}
    </div>
  </div>
</header>

<script>
// Mobile navigation toggle
document.addEventListener('DOMContentLoaded', function() {
  const hamburger = document.getElementById('hamburger');
  const mobileNav = document.getElementById('mobile-nav');
  
  hamburger.addEventListener('click', function() {
    const isExpanded = hamburger.getAttribute('aria-expanded') === 'true';
    hamburger.setAttribute('aria-expanded', !isExpanded);
    hamburger.classList.toggle('active');
    mobileNav.classList.toggle('active');
    document.body.classList.toggle('nav-open');
  });
  
  // Close mobile nav when clicking on a link
  const mobileLinks = document.querySelectorAll('.mobile-nav-link');
  mobileLinks.forEach(link => {
    link.addEventListener('click', () => {
      hamburger.classList.remove('active');
      mobileNav.classList.remove('active');
      document.body.classList.remove('nav-open');
      hamburger.setAttribute('aria-expanded', 'false');
    });
  });
});
</script>
