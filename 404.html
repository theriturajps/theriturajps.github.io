<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>404 Not Found</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			font-family: 'Arial', sans-serif;
			background-color: #fdfdfd;
			color: #202124;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			height: 100vh;
			text-align: center;
		}

		h1 {
			font-size: 6rem;
			margin: 0;
			color: #4285f4;
		}

		h2 {
			font-size: 2rem;
			margin: 0.5rem 0;
		}

		p {
			font-size: 1rem;
			margin: 1rem 0;
		}

		.search-box {
			position: relative;
			margin: 1.5rem 0;
		}

		input[type="text"] {
			padding: 10px 50px 10px 20px;
			/* Added padding for the button */
			font-size: 1rem;
			border: 1px solid #ccc;
			border-radius: 24px;
			width: 300px;
			transition: border-color 0.3s;
		}

		input[type="text"]:focus {
			border-color: #4285f4;
			outline: none;
		}

		button {
				position: absolute;
				top: 0;
				right: 0;
				padding: 12px;
				border: none;
				background-color: #4285f4;
				color: white;
				border-radius: 24px 24px 24px 24px;
				cursor: pointer;
				transition: background-color 0.3s;
		}

		button:hover {
			background-color: #357ae8;
		}

		a {
			text-decoration: none;
			color: #4285f4;
			font-size: 1rem;
			padding: 0.5rem 1rem;
			border: 2px solid #4285f4;
			border-radius: 24px;
			transition: background-color 0.3s, color 0.3s;
		}

		a:hover {
			background-color: #4285f4;
			color: white;
		}
	</style>
</head>

<body>
	<h1>404</h1>
	<h2>Page Not Found</h2>
	<p>Sorry, the page you are looking for does not exist.</p>

	<form class="search-box" action="https://www.google.com/search" method="get" role="search">
		<input type="text" name="q" placeholder="Search Google or type a URL" aria-label="Search" required />
		<button type="submit">Search</button>
	</form>

	<p>
		<a href="/">Go to Homepage</a>
	</p>
</body>

</html>
